name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build and test
        run: make clean test
      - name: cmake test
        run: |
          cmake -S . -B build-cmake
          cmake --build build-cmake
          ctest --test-dir build-cmake --output-on-failure

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: install msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: make mingw-w64-ucrt-x86_64-gcc
      - name: build and test
        shell: msys2 {0}
        run: make clean test
