name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - name: install msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: make mingw-w64-ucrt-x86_64-gcc
      - name: cut release
        shell: msys2 {0}
        run: powershell -ExecutionPolicy Bypass -File ./scripts/release.ps1
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deadgl-*/*
            dist/deadgl-*-source.zip
          fail_on_unmatched_files: true
