name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: install msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: make mingw-w64-ucrt-x86_64-gcc
      - name: cut release
        shell: msys2 {0}
        env:
          DEADGL_RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          DEADGL_RELEASE_VERSION=${DEADGL_RELEASE_VERSION#v} sh scripts/release.sh
      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/deadgl-*/*
            dist/deadgl-*-source.tar.gz
          fail_on_unmatched_files: true