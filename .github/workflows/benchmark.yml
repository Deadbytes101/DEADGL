name: benchmark
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  perf:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/bench.sh scripts/debug_probe.sh
      - run: scripts/debug_probe.sh
        env:
          CC: ${{ matrix.cc }}
      - run: DEADGL_BENCH_LOOPS=200 scripts/bench.sh examples/command_machine.dgl
        env:
          CC: ${{ matrix.cc }}
      - uses: actions/upload-artifact@v4
        with:
          name: deadgl-benchmark-${{ matrix.cc }}
          path: |
            build/benchmark.txt
            build/debug_report.txt
            build/debug_command_machine.proof
            build/debug_command_machine.ppm
